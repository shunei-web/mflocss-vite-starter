<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" role="img" aria-label="mFLOCSS">
  <style>
    .logo-m { fill: #c2410c; font-family: system-ui, -apple-system, 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 36px; }
    .logo-flocss { fill: #475569; font-family: system-ui, -apple-system, 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 36px; }
    .grad-line { fill: url(#grad); }
    @media (prefers-color-scheme: dark) {
      .logo-m { fill: #ea580c; }
      .logo-flocss { fill: #94a3b8; }
      .grad-stop-start { stop-color: #94a3b8; }
      .grad-stop-end { stop-color: #ea580c; }
    }
  </style>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#475569" class="grad-stop-start" />
      <stop offset="100%" stop-color="#c2410c" class="grad-stop-end" />
    </linearGradient>
  </defs>
  <text x="0" y="36" class="logo-m">m</text>
  <text x="30" y="36" class="logo-flocss">FLOCSS</text>
  <rect x="0" y="46" width="280" height="3" rx="1.5" class="grad-line" />
</svg>
