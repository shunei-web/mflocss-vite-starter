<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="mFLOCSS">
  <style>
    .logo-m { fill: #c2410c; font-family: system-ui, -apple-system, 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 48px; }
    .logo-flocss { fill: #475569; font-family: system-ui, -apple-system, 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 0.08em; }
    .grad-line { fill: url(#grad-c); }
    @media (prefers-color-scheme: dark) {
      .logo-m { fill: #ea580c; }
      .logo-flocss { fill: #94a3b8; }
      .grad-stop-start { stop-color: #94a3b8; }
      .grad-stop-end { stop-color: #ea580c; }
    }
  </style>
  <defs>
    <linearGradient id="grad-c" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#475569" class="grad-stop-start" />
      <stop offset="100%" stop-color="#c2410c" class="grad-stop-end" />
    </linearGradient>
  </defs>
  <text x="60" y="58" text-anchor="middle" class="logo-m">m</text>
  <rect x="16" y="68" width="88" height="2.5" rx="1.25" class="grad-line" />
  <text x="60" y="92" text-anchor="middle" class="logo-flocss">FLOCSS</text>
</svg>
