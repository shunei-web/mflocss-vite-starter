  <circle cx="200" cy="100" r="18" stroke="#a3b5a5" stroke-width="2"/>
  <line x1="200" y1="118" x2="200" y2="190" stroke="#a3b5a5" stroke-width="2"/>
  <line x1="200" y1="140" x2="240" y2="160" stroke="#a3b5a5" stroke-width="2"/>
