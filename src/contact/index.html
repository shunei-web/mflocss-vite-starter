<!doctype html>
<html lang="ja" class="l-viewport">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Contact — サービス名</title>
    <meta name="description" content="お問い合わせフォーム。ご質問やご相談がございましたら、お気軽にお問い合わせください。" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Contact — サービス名" />
    <meta property="og:description" content="お問い合わせフォーム。ご質問やご相談がございましたら、お気軽にお問い合わせください。" />
    <meta property="og:image" content="https://example.com/ogp.png" />
    <meta property="og:url" content="https://example.com/contact/" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/scripts/main.js"></script>
  </head>
  <body>
    <a href="#main" class="c-skip-link p-skip-link">コンテンツへスキップ</a>
    <header class="p-header">
      <div class="l-inner p-header__inner">
        <a href="/" class="p-header__logo">
          <img src="/logo/logo.svg" alt="サービス名" width="160" height="32" />
        </a>
        <button
          type="button"
          class="p-header__hamburger"
          data-hamburger
          aria-expanded="false"
          aria-controls="global-nav"
          aria-label="メニューを開く"
        >
          <span class="p-header__hamburger-icon" aria-hidden="true"></span>
        </button>
        <nav id="global-nav" class="p-header__nav" data-nav aria-label="メインナビゲーション">
          <ul class="p-header__nav-list">
            <li><a href="/" class="p-header__nav-link" data-nav-link>Top</a></li>
            <li><a href="/#features" class="p-header__nav-link" data-nav-link>Features</a></li>
            <li><a href="/#faq" class="p-header__nav-link" data-nav-link>FAQ</a></li>
            <li><a href="/contact/" class="p-header__nav-link" data-nav-link>Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="l-section p-contact">
        <div class="l-inner p-contact__inner">
          <h1 class="c-section-heading" data-animate="fade-in">Contact</h1>
          <p class="p-contact__lead" data-animate="fade-in-slide-up">
            ご質問やご相談がございましたら、お気軽にお問い合わせください。
          </p>

          <form class="p-contact-form p-contact__form">
            <div class="p-contact-form__field" data-animate="fade-in-slide-up">
              <label class="p-contact-form__label" for="name">
                お名前<span class="p-contact-form__required" aria-hidden="true">*</span>
              </label>
              <input
                class="p-contact-form__input"
                type="text"
                id="name"
                name="name"
                autocomplete="name"
                placeholder="山田 太郎"
                required
              />
            </div>
            <div class="p-contact-form__field" data-animate="fade-in-slide-up">
              <label class="p-contact-form__label" for="email">
                メールアドレス<span class="p-contact-form__required" aria-hidden="true">*</span>
              </label>
              <input
                class="p-contact-form__input"
                type="email"
                id="email"
                name="email"
                autocomplete="email"
                placeholder="example@example.com"
                required
              />
            </div>
            <div class="p-contact-form__field" data-animate="fade-in-slide-up">
              <label class="p-contact-form__label" for="category">
                お問い合わせ種別<span class="p-contact-form__required" aria-hidden="true">*</span>
              </label>
              <select
                class="p-contact-form__select"
                id="category"
                name="category"
                required
              >
                <option value="">選択してください</option>
                <option value="general">一般的なお問い合わせ</option>
                <option value="support">技術サポート</option>
                <option value="feedback">フィードバック</option>
                <option value="other">その他</option>
              </select>
            </div>
            <div class="p-contact-form__field" data-animate="fade-in-slide-up">
              <label class="p-contact-form__label" for="subject">件名</label>
              <input
                class="p-contact-form__input"
                type="text"
                id="subject"
                name="subject"
                placeholder="お問い合わせの件名"
              />
            </div>
            <fieldset class="p-contact-form__field" data-animate="fade-in-slide-up">
              <legend class="p-contact-form__label">
                優先度<span class="p-contact-form__required" aria-hidden="true">*</span>
              </legend>
              <div class="p-contact-form__option-group">
                <label class="p-contact-form__option-label">
                  <input
                    type="radio"
                    name="priority"
                    value="low"
                  />
                  低
                </label>
                <label class="p-contact-form__option-label">
                  <input
                    type="radio"
                    name="priority"
                    value="normal"
                    checked
                    required
                  />
                  通常
                </label>
                <label class="p-contact-form__option-label">
                  <input
                    type="radio"
                    name="priority"
                    value="high"
                  />
                  高
                </label>
              </div>
            </fieldset>
            <div class="p-contact-form__field" data-animate="fade-in-slide-up">
              <label class="p-contact-form__label" for="message">
                メッセージ<span class="p-contact-form__required" aria-hidden="true">*</span>
              </label>
              <textarea
                class="p-contact-form__input"
                id="message"
                name="message"
                rows="6"
                placeholder="お問い合わせ内容をご記入ください"
                required
              ></textarea>
            </div>
            <div class="p-contact-form__field" data-animate="fade-in-slide-up">
              <label class="p-contact-form__option-label">
                <input
                  type="checkbox"
                  name="agree"
                  id="agree"
                  required
                />
                プライバシーポリシーに同意する
              </label>
            </div>
            <button
              type="submit"
              class="c-button-cta -large p-contact-form__submit" data-animate="fade-in-slide-up"
            >
              送信する
            </button>
          </form>
        </div>
      </section>
    </main>

    <footer class="p-footer">
      <nav class="p-footer__nav" data-stagger="fade-in-slide-up" aria-label="フッターナビゲーション">
        <div class="p-footer__nav-group">
          <p class="p-footer__nav-heading">Service</p>
          <ul class="p-footer__nav-list">
            <li><a href="/#features" class="p-footer__nav-link">Features</a></li>
            <li><a href="/#faq" class="p-footer__nav-link">FAQ</a></li>
          </ul>
        </div>
        <div class="p-footer__nav-group">
          <p class="p-footer__nav-heading">Support</p>
          <ul class="p-footer__nav-list">
            <li><a href="/contact/" class="p-footer__nav-link">Contact</a></li>
            <li><a href="https://github.com/" class="p-footer__nav-link" target="_blank" rel="noopener noreferrer">GitHub</a></li>
          </ul>
        </div>
      </nav>
      <div class="p-footer__bottom">
        <p class="p-footer__copyright">&copy; 2026 Your Company</p>
      </div>
    </footer>

    <!-- Back to Top -->
    <a href="#" class="c-back-to-top p-back-to-top" data-animate="fade-in" data-no-observe data-back-to-top aria-label="ページの先頭に戻る">
      <svg class="c-back-to-top__icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 4l-8 8h5v8h6v-8h5z" />
      </svg>
    </a>
  </body>
</html>
